id: cripto
name: Criptoativos
description: Criptomoedas e tokens de exchanges descentralizadas e centralizadas
base_currency: BRL
status: active
owner_id: default  # Member who owns this portfolio (must exist in DB; create with scripts/create_member.py)

rules:
  allowed_asset_types:
    - crypto

sources:
  - type: binance_csv
    enabled: true
  # Bootstrap por XLSX manual — habilite se quiser carregar histórico
  # antigo a partir de uma planilha preenchida à mão.
  # Veja docs/fontes-de-dados/manual-xlsx.md
  - type: manual_xlsx_crypto
    enabled: false

import:
  move_processed_files: true
  deduplicate_by:
    - source
    - external_id
    - operation_date
    - asset_code
    - operation_type
