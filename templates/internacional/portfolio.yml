id: internacional
name: Internacional
description: Ações, ETFs e REITs no exterior (Avenue, Nomad, IBKR…)
base_currency: BRL
status: active
owner_id: default  # Member who owns this portfolio (must exist in DB; create with scripts/create_member.py)

rules:
  allowed_asset_types:
    - stock_us
    - etf_us
    - reit_us
    - bdr_us

sources:
  - type: avenue_apex_pdf
    enabled: true

import:
  move_processed_files: true
  deduplicate_by:
    - source
    - external_id
    - operation_date
    - asset_code
    - operation_type
