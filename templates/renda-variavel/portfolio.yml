id: renda-variavel
name: Renda Variável
description: Carteira de ações, FIIs, ETFs e BDRs listados na B3
base_currency: BRL
status: active
owner_id: default  # Member who owns this portfolio (must exist in DB; create with scripts/create_member.py)

rules:
  allowed_asset_types:
    - stock
    - fii
    - etf
    - bdr

sources:
  - type: b3_csv
    enabled: true
  - type: b3_movimentacao_xlsx
    enabled: true
  - type: manual_dividends_csv
    enabled: true
  - type: broker_csv
    enabled: true
  # Bootstrap por XLSX manual — habilite se quiser carregar histórico
  # antigo a partir de uma planilha preenchida à mão.
  # Veja docs/fontes-de-dados/manual-xlsx.md
  - type: manual_xlsx_b3
    enabled: true

import:
  move_processed_files: true
  deduplicate_by:
    - source
    - external_id
    - operation_date
    - asset_code
    - operation_type
